name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Detect project folder
        run: |
          if [ -f "ExpenseGuardApp/settings.gradle" ]; then
            echo "PROJECT_DIR=ExpenseGuardApp" >> "$GITHUB_ENV"
          else
            echo "PROJECT_DIR=." >> "$GITHUB_ENV"
          fi

      - name: Build APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon

      - name: Publish APK and update.json into repository
        run: |
          VERSION_NAME=$(grep -E "versionName" "$PROJECT_DIR/app/build.gradle" | head -1 | sed -E "s/.*versionName ['\"]([^'\"]+)['\"].*/\1/")
          VERSION_CODE=$(grep -E "versionCode" "$PROJECT_DIR/app/build.gradle" | head -1 | sed -E "s/[^0-9]*([0-9]+).*/\1/")
          APK_SOURCE=$(find "$PROJECT_DIR/app/build/outputs/apk/debug" -name "*.apk" | head -1)

          if [ -z "$APK_SOURCE" ]; then
            echo "APK file was not found"
            exit 1
          fi

          mkdir -p downloads
          cp "$APK_SOURCE" "downloads/Masrofaty-latest.apk"
          cp "$APK_SOURCE" "downloads/Masrofaty-v${VERSION_NAME}.apk"

          cat > update.json <<EOF
          {
            "latestVersionCode": ${VERSION_CODE},
            "latestVersionName": "${VERSION_NAME}",
            "apkUrl": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/downloads/Masrofaty-latest.apk",
            "notes": "تحديث جديد متاح للتحميل المباشر",
            "dataVersion": "2026-06-29",
            "message": "يوجد تحديث جديد متاح الآن"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add downloads update.json

          if git diff --cached --quiet; then
            echo "No APK/update changes to commit"
          else
            git commit -m "Publish Masrofaty APK v${VERSION_NAME}"
            git push
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Masrofaty-apk
          path: "downloads/*.apk"
